<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar Resultado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-dark-blue {
            background-color: #10182F;
            color: #FFF;
            font-weight: 700;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-dark-blue:hover {
            background-color: #FFF;
            color: #10182F;
            border: 1px solid #10182F;
        }
        
        .btn-outline-dark-blue {
            background-color: #FFF;
            color: #10182F;
            font-weight: 700;
            border: 1px solid #10182F;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-outline-dark-blue:hover {
            background-color: #10182F;
            color: #FFF;
        }
        
        .card {
            border-radius: 10px;
            border: none;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .card-body {
            padding: 40px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-center">Agregar Resultado</h3>
                        <p class="text-center text-muted">Ingresa los datos del resultado del estudiante</p>

                        <form method="POST" class="mt-4">
                            {% csrf_token %}

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="estudiante" class="form-label">Estudiante:</label>
                                    <select id="estudiante" name="estudiante" class="form-select" required>
                                        <option value="" disabled selected>Selecciona un estudiante</option>
                                        {% for estudiante in estudiantes %}
                                        <option value="{{ estudiante.id }}">{{ estudiante.nombre }} {{ estudiante.apellido }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="examen" class="form-label">Examen:</label>
                                    <select id="examen" name="examen" class="form-select" required>
                                        <option value="" disabled selected>Selecciona un examen</option>
                                        {% for examen in examenes %}
                                        <option value="{{ examen.id }}">{{ examen.nombre }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="puntaje_global" class="form-label">Puntaje Global:</label>
                                    <input type="number" id="puntaje_global" name="puntaje_global" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="lectura_critica" class="form-label">Lectura Crítica:</label>
                                    <input type="number" id="lectura_critica" name="lectura_critica" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="matematicas" class="form-label">Matemáticas:</label>
                                    <input type="number" id="matematicas" name="matematicas" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="sociales_ciudadanas" class="form-label">Sociales y Ciudadanas:</label>
                                    <input type="number" id="sociales_ciudadanas" name="sociales_ciudadanas" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="ciencias_naturales" class="form-label">Ciencias Naturales:</label>
                                    <input type="number" id="ciencias_naturales" name="ciencias_naturales" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="ingles" class="form-label">Inglés:</label>
                                    <input type="number" id="ingles" name="ingles" class="form-control" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-dark-blue">Agregar Resultado</button>
                                <a href="{% url 'base:home' %}" class="btn btn-outline-dark-blue">Volver</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
