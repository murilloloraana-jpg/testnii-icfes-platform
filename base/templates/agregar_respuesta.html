<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar Respuesta</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-dark-blue {
            background-color: #10182F;
            color: #FFF;
            font-weight: 700;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-dark-blue:hover {
            background-color: #FFF;
            color: #10182F;
            border: 1px solid #10182F;
        }
        
        .btn-outline-dark-blue {
            background-color: #FFF;
            color: #10182F;
            font-weight: 700;
            border: 1px solid #10182F;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-outline-dark-blue:hover {
            background-color: #10182F;
            color: #FFF;
        }
        
        .card {
            border-radius: 10px;
            border: none;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .card-body {
            padding: 40px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-center">Agregar Respuesta</h3>
                        <p class="text-center text-muted">Ingresa la respuesta del estudiante</p>

                        <form method="POST" class="mt-4">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="estudiante" class="form-label">Estudiante:</label>
                                <select id="estudiante" name="estudiante" class="form-select" required>
                                    <option value="" disabled selected>Selecciona un estudiante</option>
                                    {% for estudiante in estudiantes %}
                                        <option value="{{ estudiante.id_estudiante }}">{{ estudiante.nombre }} {{ estudiante.apellido }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="pregunta" class="form-label">Pregunta:</label>
                                <select id="pregunta" name="pregunta" class="form-select" required>
                                    <option value="" disabled selected>Selecciona una pregunta</option>
                                    {% for pregunta in preguntas %}
                                        <option value="{{ pregunta.id_pregunta }}">{{ pregunta.enunciado }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="respuesta_seleccionada" class="form-label">Respuesta Seleccionada:</label>
                                <input type="text" id="respuesta_seleccionada" name="respuesta_seleccionada" class="form-control" required>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-dark-blue">Agregar Respuesta</button>
                                <a href="{% url 'base:home' %}" class="btn btn-outline-dark-blue">Volver</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
