<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Simulacro Finalizado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        background-color: #f9fafb;
        font-family: Arial, sans-serif;
        color: #111827;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .box {
        background: white;
        padding: 3rem;
        border-radius: 1.25rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        max-width: 600px;
      }

      h1 {
        color: #16a34a;
        font-size: 2rem;
        margin-bottom: 1rem;
      }

      p {
        font-size: 1.1rem;
        color: #374151;
        margin-bottom: 2rem;
      }

      a.button {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background-color: #2563eb;
        color: white;
        border-radius: 9999px;
        text-decoration: none;
        font-weight: bold;
        transition: background 0.2s ease-in-out;
      }

      a.button:hover {
        background-color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>¡Has finalizado el simulacro!</h1>
      <p>
        Gracias por completar el simulacro de Lectura Crítica.<br />Muy pronto
        podrás ver tus resultados.
      </p>
      <a href="../estudiante" class="button">Volver al inicio</a>
    </div>
  </body>
</html>
