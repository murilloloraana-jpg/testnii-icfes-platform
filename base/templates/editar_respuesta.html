<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Respuesta</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-dark-blue {
            background-color: #10182F;
            color: #FFF;
            font-weight: 700;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-dark-blue:hover {
            background-color: #FFF;
            color: #10182F;
            border: 1px solid #10182F;
        }
        
        .btn-outline-dark-blue {
            background-color: #FFF;
            color: #10182F;
            font-weight: 700;
            border: 1px solid #10182F;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-outline-dark-blue:hover {
            background-color: #10182F;
            color: #FFF;
        }
        
        .card {
            border-radius: 10px;
            border: none;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .card-body {
            padding: 40px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-center">Editar Respuesta</h3>
                        <p class="text-center text-muted">Modifica la información y guarda los cambios</p>

                        <form method="POST" class="mt-4">
                            {% csrf_token %}
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="id_estudiante" class="form-label">Estudiante:</label>
                                    <select id="id_estudiante" name="estudiante" class="form-select">
                                        {% for estudiante in estudiantes %}
                                            <option value="{{ estudiante.id }}" {% if form.estudiante.value == estudiante.id %}selected{% endif %}>{{ estudiante }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="id_pregunta" class="form-label">Pregunta:</label>
                                    <select id="id_pregunta" name="pregunta" class="form-select">
                                        {% for pregunta in preguntas %}
                                            <option value="{{ pregunta.id }}" {% if form.pregunta.value == pregunta.id %}selected{% endif %}>{{ pregunta }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label for="id_respuesta_seleccionada" class="form-label">Respuesta:</label>
                                    <input type="text" id="id_respuesta_seleccionada" name="respuesta_seleccionada" class="form-control" value="{{ form.respuesta_seleccionada.value }}">
                                </div>
                                <div class="col-12">
                                    <label for="id_fecha_respuesta" class="form-label">Fecha de Respuesta:</label>
                                    <input type="datetime-local" id="id_fecha_respuesta" name="fecha_respuesta" class="form-control" value="{{ form.fecha_respuesta.value|date:'Y-m-d\TH:i' }}">
                                </div>
                            </div>
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-dark-blue">Guardar Cambios</button>
                                <a href="{% url 'base:home' %}" class="btn btn-outline-dark-blue">Volver</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
