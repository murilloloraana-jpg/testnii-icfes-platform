<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar Nueva Pregunta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 10px;
            border: none;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background-color: #10182F;
            color: #FFF;
            font-weight: 700;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            padding: 1rem 1.5rem;
        }
        .card-body {
            padding: 2rem 2.5rem;
        }
        .btn-dark-blue {
            background-color: #10182F;
            color: #FFF;
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            border: none;
        }
        .btn-dark-blue:hover {
            background-color: #1b2a4e;
        }
        .btn-outline-dark-blue {
            color: #10182F;
            border-color: #10182F;
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
        }
        .btn-outline-dark-blue:hover {
            background-color: #10182F;
            color: #FFF;
        }
        .form-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .dynamic-option-row {
            margin-bottom: 0.75rem;
        }
        .respuesta-group .form-check-input[type="radio"] {
            margin-top: 0.8rem;
        }
        .btn-danger {
            font-size: 0.8rem;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h4 class="mb-0 text-center">Agregar Nueva Pregunta</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST" id="formAgregarPregunta" class="mt-3">
                            {% csrf_token %}
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}

                            <div class="row g-3">
                                <div class="col-md-12">
                                    <label for="examen" class="form-label">Examen al que pertenece:</label>
                                    <select id="examen" name="examen" class="form-select" required>
                                        <option value="" disabled {% if not form_data.examen %}selected{% endif %}>Selecciona un examen</option>
                                        {% for examen_obj in examenes %}
                                        <option value="{{ examen_obj.id_examen }}" {% if form_data.examen == examen_obj.id_examen|stringformat:"s" %}selected{% endif %}>
                                            {{ examen_obj.tipo }} (ID: {{ examen_obj.id_examen }})
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="col-md-12">
                                    <label for="enunciado" class="form-label">Enunciado de la pregunta:</label>
                                    <textarea id="enunciado" name="enunciado" class="form-control" rows="3" required>{{ form_data.enunciado|default_if_none:"" }}</textarea>
                                </div>

                                <div class="col-md-12">
                                    <label for="tipo_pregunta" class="form-label">Tipo de Pregunta:</label>
                                    <select id="tipo_pregunta" name="tipo_pregunta" class="form-select" required>
                                        <option value="" disabled {% if not form_data.tipo_pregunta %}selected{% endif %}>Selecciona un tipo</option>
                                        <option value="Opción Múltiple" {% if form_data.tipo_pregunta == "Opción Múltiple" %}selected{% endif %}>Opción Múltiple</option>
                                        <option value="Verdadero/Falso" {% if form_data.tipo_pregunta == "Verdadero/Falso" %}selected{% endif %}>Verdadero/Falso</option>
                                    </select>
                                </div>
                            </div>

                            <div id="opcionesRespuestaContainer" class="mt-4">
                                <!-- Contenido dinámico según el tipo de pregunta -->
                            </div>

                            <div class="d-grid gap-3 mt-4 pt-3 border-top">
                                <button type="submit" class="btn btn-dark-blue">
                                    <i class="bi bi-plus-circle-fill me-2"></i>Agregar Pregunta
                                </button>
                                <a href="{% url 'base:listar_preguntas' %}" class="btn btn-outline-dark-blue">
                                    <i class="bi bi-x-circle me-2"></i>Cancelar y Volver
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const tipoPreguntaSelect = document.getElementById('tipo_pregunta');
            const opcionesRespuestaContainer = document.getElementById('opcionesRespuestaContainer');
            let opcionCounter = 0;

            // Default a 'Opción Múltiple' si no hay valor o si no hay datos de formulario previos que indiquen lo contrario
            if (!tipoPreguntaSelect.value) { // Si el select no fue repoblado por Django con un valor
                const formDataSourceInitial = JSON.parse('{{ form_data_json|safe|default:"{}" }}');
                if (formDataSourceInitial && formDataSourceInitial.tipo_pregunta) {
                    tipoPreguntaSelect.value = formDataSourceInitial.tipo_pregunta;
                } else {
                    tipoPreguntaSelect.value = 'Opción Múltiple'; // Default si no hay nada en form_data_json tampoco
                }
            }

            function renderizarOpciones() {
                const tipoSeleccionado = tipoPreguntaSelect.value;
                opcionesRespuestaContainer.innerHTML = '';
                opcionCounter = 0;

                if (tipoSeleccionado === 'Opción Múltiple') {
                    opcionesRespuestaContainer.innerHTML = `
                        <h5 class="mb-3">Opciones de Respuesta:</h5>
                        <div id="listaOpcionesMultiples"></div>
                        <button type="button" class="btn btn-sm btn-outline-primary mt-2" id="btnAgregarOpcion"><i class="bi bi-plus-lg"></i> Agregar Opción</button>
                        <p class="form-text text-muted mt-1">Debes agregar al menos 2 opciones y seleccionar una como correcta.</p>
                    `;
                    document.getElementById('btnAgregarOpcion').addEventListener('click', agregarOpcionMultiple);

                    try {
                        const formDataSource = JSON.parse('{{ form_data_json|safe|default:"{}" }}');
                        const respuestasAnteriores = formDataSource.opcion_texto;
                        const correctaAnterior = formDataSource.respuesta_correcta_om_indice;

                        if (Array.isArray(respuestasAnteriores) && respuestasAnteriores.length > 0) {
                            respuestasAnteriores.forEach((textoOpcion, index) => {
                                agregarOpcionMultiple(textoOpcion, String(index) === String(correctaAnterior));
                            });
                        } else {
                            agregarOpcionMultiple();
                            agregarOpcionMultiple();
                            agregarOpcionMultiple(); // Opción 3
                            agregarOpcionMultiple(); // Opción 4
                        }
                    } catch (e) {
                        console.error("[renderizarOpciones] Error procesando opciones OM:", e);
                        agregarOpcionMultiple();
                        agregarOpcionMultiple();
                        agregarOpcionMultiple(); // Opción 3
                        agregarOpcionMultiple(); // Opción 4
                    }

                } else if (tipoSeleccionado === 'Verdadero/Falso') {
                    try {
                        const formDataSourceVF = JSON.parse('{{ form_data_json|safe|default:"{}" }}');
                        const correctaAnteriorVF = formDataSourceVF.respuesta_correcta_vf;
                        const checkedVerdadero = String(correctaAnteriorVF) === 'Verdadero' ? 'checked' : '';
                        const checkedFalso = String(correctaAnteriorVF) === 'Falso' ? 'checked' : '';

                        opcionesRespuestaContainer.innerHTML = `
                            <h5 class="mb-3">Respuesta Correcta:</h5>
                            <div class="respuesta-group">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="respuesta_correcta_vf" id="vf_verdadero" value="Verdadero" required ${checkedVerdadero}>
                                    <label class="form-check-label" for="vf_verdadero">Verdadero</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="respuesta_correcta_vf" id="vf_falso" value="Falso" required ${checkedFalso}>
                                    <label class="form-check-label" for="vf_falso">Falso</label>
                                </div>
                            </div>`;
                    } catch (e) {
                        console.error("[renderizarOpciones] Error procesando opciones VF:", e);
                        opcionesRespuestaContainer.innerHTML = "Error al cargar opciones V/F. Revise la consola.";
                    }
                }
            }

            function agregarOpcionMultiple(textoDefault = '', esCorrectaDefault = false) {
                opcionCounter++;
                const div = document.createElement('div');
                div.classList.add('row', 'g-2', 'align-items-center', 'dynamic-option-row', `opcion-row-${opcionCounter}`);
                const isChecked = esCorrectaDefault ? 'checked' : '';
                div.innerHTML = `
                    <div class="col-auto">
                        <input class="form-check-input" type="radio" name="respuesta_correcta_om_indice" value="${opcionCounter - 1}" id="correcta_om_${opcionCounter - 1}" required ${isChecked}>
                    </div>
                    <div class="col">
                        <input type="text" name="opcion_texto" class="form-control form-control-sm" placeholder="Texto de la opción ${opcionCounter}" value="${textoDefault}" required>
                    </div>
                    <div class="col-auto">
                        <button type="button" class="btn btn-sm btn-outline-danger btnEliminarOpcion" data-opcion-id="${opcionCounter}">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>`;
                
                const lista = document.getElementById('listaOpcionesMultiples');
                if (lista) {
                    lista.appendChild(div);
                } else {
                    console.error("[agregarOpcionMultiple] ERROR: 'listaOpcionesMultiples' NO encontrado.");
                }

                actualizarEstadoBotonesEliminar();
                div.querySelector('.btnEliminarOpcion').addEventListener('click', function() {
                    eliminarOpcionMultiple(this.dataset.opcionId);
                });
            }
            
            function eliminarOpcionMultiple(opcionId) {
                const listaOpciones = document.getElementById('listaOpcionesMultiples');
                if (listaOpciones.children.length > 2) { 
                    const opcionAEliminar = document.querySelector(`.opcion-row-${opcionId}`);
                    if (opcionAEliminar) {
                        const fueEliminadoRadioSeleccionado = opcionAEliminar.querySelector('input[type="radio"]:checked');
                        opcionAEliminar.remove();
                        
                        const radios = listaOpciones.querySelectorAll('input[name="respuesta_correcta_om_indice"]');
                        let radioSeleccionadoDespuesDeEliminar = false;
                        radios.forEach((radio, nuevoIndice) => {
                            radio.value = nuevoIndice;
                            if(radio.checked) radioSeleccionadoDespuesDeEliminar = true;
                        });

                        if(fueEliminadoRadioSeleccionado && !radioSeleccionadoDespuesDeEliminar && radios.length > 0){
                            radios[0].checked = true;
                        }
                        opcionCounter = radios.length; 
                        actualizarEstadoBotonesEliminar();
                    } else {
                        console.warn("[eliminarOpcionMultiple] No se encontró el elemento a eliminar con la clase .opcion-row-", opcionId);
                    }
                } else {
                    alert("Debe haber al menos dos opciones.");
                }
            }

            function actualizarEstadoBotonesEliminar() {
                const listaOpciones = document.getElementById('listaOpcionesMultiples');
                if (!listaOpciones) return; 

                const botonesEliminar = listaOpciones.querySelectorAll('.btnEliminarOpcion');
                if (listaOpciones.children.length <= 2) {
                    botonesEliminar.forEach(btn => btn.disabled = true);
                } else {
                    botonesEliminar.forEach(btn => btn.disabled = false);
                }
            }

            tipoPreguntaSelect.addEventListener('change', renderizarOpciones);
            
            renderizarOpciones(); 
        });

        document.getElementById('formAgregarPregunta').addEventListener('submit', function(event) {
            const tipo = document.getElementById('tipo_pregunta').value;
            if (tipo === 'Opción Múltiple') {
                const opciones = document.querySelectorAll('input[name="opcion_texto"]');
                if (opciones.length < 2) {
                    alert('Debe agregar al menos 2 opciones para una pregunta de opción múltiple.');
                    event.preventDefault();
                    return;
                }
                let algunTextoVacio = false;
                opciones.forEach(opcion => {
                    if (opcion.value.trim() === '') {
                        algunTextoVacio = true;
                    }
                });
                if (algunTextoVacio) {
                    alert('El texto de todas las opciones de opción múltiple es obligatorio.');
                    event.preventDefault();
                    return;
                }
                const correctas = document.querySelector('input[name="respuesta_correcta_om_indice"]:checked');
                if (!correctas) {
                    alert('Debe seleccionar una respuesta correcta para opción múltiple.');
                    event.preventDefault();
                    return;
                }
            } else if (tipo === 'Verdadero/Falso') {
                const correctaVF = document.querySelector('input[name="respuesta_correcta_vf"]:checked');
                if (!correctaVF) {
                    alert('Debe seleccionar Verdadero o Falso como respuesta correcta.');
                    event.preventDefault();
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
