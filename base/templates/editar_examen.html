<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Examen</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-dark-blue {
            background-color: #10182F;
            color: #FFF;
            font-weight: 700;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-dark-blue:hover {
            background-color: #FFF;
            color: #10182F;
            border: 1px solid #10182F;
        }
        
        .btn-outline-dark-blue {
            background-color: #FFF;
            color: #10182F;
            font-weight: 700;
            border: 1px solid #10182F;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-outline-dark-blue:hover {
            background-color: #10182F;
            color: #FFF;
        }
        
        .card {
            border-radius: 10px;
            border: none;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .card-body {
            padding: 40px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-center">Editar Examen</h3>
                        <p class="text-center text-muted">Modifica la información y guarda los cambios</p>

                        <form method="POST" class="mt-4">
                            {% csrf_token %}

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="fecha_examen" class="form-label">Fecha del Examen:</label>
                                    <input type="datetime-local" id="fecha_examen" name="fecha_examen" class="form-control" value="{{ form.fecha_examen.value }}">
                                </div>
                                <div class="col-md-6">
                                    <label for="tipo" class="form-label">Tipo de Examen:</label>
                                    <input type="text" id="tipo" name="tipo" class="form-control" value="{{ form.tipo.value }}">
                                </div>

                                <div class="col-md-6">
                                    <label for="duracion" class="form-label">Duración (horas):</label>
                                    <input type="number" id="duracion" name="duracion" class="form-control" value="{{ form.duracion.value }}">
                                </div>
                                <div class="col-md-6">
                                    <label for="ubicacion" class="form-label">Ubicación:</label>
                                    <input type="text" id="ubicacion" name="ubicacion" class="form-control" value="{{ form.ubicacion.value }}">
                                </div>

                                <div class="col-md-6">
                                    <label for="estado" class="form-label">Estado:</label>
                                    <select id="estado" name="estado" class="form-select">
                                        <option value="Activo" {% if form.estado.value == "Activo" %}selected{% endif %}>Activo</option>
                                        <option value="Pendiente" {% if form.estado.value == "Pendiente" %}selected{% endif %}>Pendiente</option>
                                        <option value="Realizado" {% if form.estado.value == "Realizado" %}selected{% endif %}>Realizado</option>
                                        <option value="Cancelado" {% if form.estado.value == "Cancelado" %}selected{% endif %}>Cancelado</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-dark-blue">Guardar Cambios</button>
                                <a href="{% url 'base:home' %}" class="btn btn-outline-dark-blue">Volver</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
