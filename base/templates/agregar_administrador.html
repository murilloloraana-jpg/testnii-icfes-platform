<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar Administrador</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .btn-dark-blue {
            background-color: #10182F;
            color: #FFF;
            font-weight: 700;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-dark-blue:hover {
            background-color: #FFF;
            color: #10182F;
            border: 1px solid #10182F;
        }
        
        .btn-outline-dark-blue {
            background-color: #FFF;
            color: #10182F;
            font-weight: 700;
            border: 1px solid #10182F;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-outline-dark-blue:hover {
            background-color: #10182F;
            color: #FFF;
        }
        
        .card {
            border-radius: 10px;
            border: none;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .card-body {
            padding: 40px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-center">Agregar Administrador</h3>
                        <p class="text-center text-muted">Ingresa la información del nuevo administrador</p>

                        <form method="POST" class="mt-4">
                            {% csrf_token %}

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="nombre" class="form-label">Nombre:</label>
                                    <input type="text" id="nombre" name="nombre" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="apellido" class="form-label">Apellido:</label>
                                    <input type="text" id="apellido" name="apellido" class="form-control" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="identificacion" class="form-label">Identificación:</label>
                                    <input type="text" id="identificacion" name="identificacion" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="correo" class="form-label">Correo Electrónico:</label>
                                    <input type="email" id="correo" name="correo" class="form-control" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="telefono" class="form-label">Teléfono:</label>
                                    <input type="tel" id="telefono" name="telefono" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label for="rol" class="form-label">Rol:</label>
                                    <input type="text" id="rol" name="rol" class="form-control" value="Administrador" readonly>
                                </div>

                                <div class="col-md-6">
                                    <label for="contraseña" class="form-label">Contraseña:</label>
                                    <input type="password" id="contraseña" name="contraseña" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="fecha_registro" class="form-label">Fecha de Registro:</label>
                                    <input type="datetime-local" id="fecha_registro" name="fecha_registro" class="form-control">
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-dark-blue">Agregar Administrador</button>
                                <a href="{% url 'base:home' %}" class="btn btn-outline-dark-blue">Volver</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
