<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agregar Materia</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .btn-dark-blue {
            background-color: #10182f;
            color: #fff;
            font-weight: 700;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-dark-blue:hover {
            background-color: #fff;
            color: #10182f;
            border: 1px solid #10182f;
        }
        
        .btn-outline-dark-blue {
            background-color: #fff;
            color: #10182f;
            font-weight: 700;
            border: 1px solid #10182f;
            padding: 10px;
            border-radius: 5px;
        }
        
        .btn-outline-dark-blue:hover {
            background-color: #10182f;
            color: #fff;
        }
        
        .card {
            border-radius: 10px;
            border: none;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .card-body {
            padding: 40px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-center">Agregar Materia</h3>
                        <p class="text-center text-muted">
                            Ingresa la información de la nueva materia
                        </p>

                        <form method="POST" class="mt-4">
                            {% csrf_token %}

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="nombre" class="form-label">Nombre de la Materia:</label
                    >
                    <input
                      type="text"
                      id="nombre"
                      name="nombre"
                      class="form-control"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label for="area" class="form-label">Área:</label>
                                    <input type="text" id="area" name="area" class="form-control" />
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-dark-blue">
                    Agregar Materia
                  </button>
                                <a href="{% url 'base:home' %}" class="btn btn-outline-dark-blue">Volver</a
                  >
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
