{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seleccionar Grados - TestNii</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-purple: #7c3aed;
            --light-purple: #a78bfa;
            --lighter-purple: #ede9fe;
            --darker-purple: #5b21b6;
            --secondary-teal: #14b8a6;
            --text-primary-color: #1f2937;
            --text-secondary-color: #6b7280;
            --text-on-purple: #ffffff;
            --page-bg: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
            --card-bg: #ffffff;
            --card-border-subtle: #ddd6fe;
            --shadow-color: rgba(91, 33, 182, 0.08);
            --strong-shadow-color: rgba(91, 33, 182, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--page-bg);
            color: var(--text-primary-color);
            margin: 0;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-purple);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary-color);
            margin-bottom: 3rem;
        }

        .grades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .grade-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid var(--card-border-subtle);
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .grade-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px var(--strong-shadow-color);
            border-color: var(--primary-purple);
        }

        .grade-card.selected {
            border-color: var(--primary-purple);
            background-color: var(--lighter-purple);
            box-shadow: 0 8px 20px var(--strong-shadow-color);
        }
        .grade-card.selected .grade-icon {
            color: var(--primary-purple);
            transform: scale(1.1);
        }
        .grade-card.selected .grade-name {
            color: var(--darker-purple);
        }


        .grade-icon {
            font-size: 3.5rem;
            color: var(--light-purple);
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .grade-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary-color);
            margin-bottom: 0.5rem;
        }

        .grade-description {
            font-size: 0.9rem;
            color: var(--text-secondary-color);
            min-height: 40px; /* Para alinear tarjetas */
        }
        
        .btn-submit {
            background: var(--primary-purple);
            color: var(--text-on-purple);
            padding: 0.9rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-submit:hover {
            background: var(--darker-purple);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(91, 33, 182, 0.3);
        }
        
        /* Hidden checkbox for selection */
        .grade-card input[type="checkbox"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="main-title">¡Bienvenido, Profesor {{ request.session.profesor_nombre|default:'' }}!</h1>
        <p class="subtitle">Un último paso: selecciona los grados a los que enseñas.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="grades-grid">
                <label class="grade-card" for="grade_9">
                    <input type="checkbox" name="grados_seleccionados" value="9" id="grade_9">
                    <div class="grade-icon"><i class="bi bi-book-half"></i></div>
                    <h3 class="grade-name">Noveno Grado</h3>
                    <p class="grade-description">Marcar si enseñas a estudiantes de 9A y 9B.</p>
                </label>

                <label class="grade-card" for="grade_10">
                    <input type="checkbox" name="grados_seleccionados" value="10" id="grade_10">
                    <div class="grade-icon"><i class="bi bi-journal-richtext"></i></div>
                    <h3 class="grade-name">Décimo Grado</h3>
                    <p class="grade-description">Marcar si enseñas a estudiantes de 10A y 10B.</p>
                </label>

                <label class="grade-card" for="grade_11">
                    <input type="checkbox" name="grados_seleccionados" value="11" id="grade_11">
                    <div class="grade-icon"><i class="bi bi-mortarboard-fill"></i></div>
                    <h3 class="grade-name">Onceavo Grado</h3>
                    <p class="grade-description">Marcar si enseñas a estudiantes de 11A y 11B.</p>
                </label>
            </div>

            {% if error %}
                <p style="color: red; margin-bottom: 1.5rem;">{{ error }}</p>
            {% endif %}

            <button type="submit" class="btn-submit">Guardar Grados y Continuar <i class="bi bi-arrow-right-circle-fill"></i></button>
        </form>
    </div>

    <script>
        document.querySelectorAll('.grade-card').forEach(card => {
            const checkbox = card.querySelector('input[type="checkbox"]');
            card.addEventListener('click', (event) => {
                // El clic en el label ya cambia el estado del checkbox.
                // Solo necesitamos actualizar la clase visual.
                // Usamos un pequeño timeout para asegurar que el estado 'checked' se haya actualizado antes de leerlo.
                setTimeout(() => {
                    if (checkbox.checked) {
                        card.classList.add('selected');
                    } else {
                        card.classList.remove('selected');
                    }
                }, 0);
            });

            // Asegurar estado visual inicial si el navegador recuerda los checked status (ej. al usar back button)
            if (checkbox.checked) {
                card.classList.add('selected');
            }
        });
    </script>
</body>
</html>
