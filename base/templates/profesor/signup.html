{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrarse</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #d3cbf7;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .container {
        display: flex;
        width: 1000px;
        max-width: 100%;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.1);
      }

      .left-panel {
        background: #f5f3ff;
        padding: 40px;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .left-panel h2 {
        color: #6a5acd;
        margin-bottom: 30px;
        font-size: 28px;
        font-weight: 600;
        text-align: center;
      }

      .form-row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }

      .form-group {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        font-size: 14px;
        margin-bottom: 5px;
        color: #6a5acd;
      }

      .form-group input {
        padding: 10px;
        border: 2px solid #d6d1f7;
        border-radius: 8px;
        outline: none;
      }

      .form-group input:focus {
        border-color: #6a5acd;
        box-shadow: 0 0 0 0.2rem rgba(106, 90, 205, 0.25);
      }

      .btn {
        width: 100%;
        background: #6a5acd;
        color: white;
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .btn:hover {
        background: #5b4fb5;
      }

      .link {
        text-align: center;
        font-size: 13px;
        margin-top: 15px;
        color: #6a5acd;
      }

      .right-panel {
        flex: 1;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
      }

      .right-panel img {
        max-width: 100%;
        max-height: 400px;
        border-radius: 20px;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left-panel">
        <h2>Registrarse - Profesor@</h2>
        <form method="POST" action="{% url 'base:signup_profesor' %}">
          {% csrf_token %} {% if error %}
          <div style="color: red; margin-bottom: 10px">{{ error }}</div>
          {% endif %} {% for message in messages %}
          <div style="color: green; margin-bottom: 10px">{{ message }}</div>
          {% endfor %}

          <div class="form-row">
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" name="nombre" required />
            </div>
            <div class="form-group">
              <label for="apellido">Apellido</label>
              <input type="text" id="apellido" name="apellido" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="identificacion">Identificación</label>
              <input
                type="text"
                id="identificacion"
                name="identificacion"
                required
              />
            </div>
            <div class="form-group">
              <label for="correo">Correo</label>
              <input type="email" id="correo" name="correo" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="telefono">Teléfono</label>
              <input type="text" id="telefono" name="telefono" />
            </div>
            <div class="form-group">
              <label for="direccion">Dirección</label>
              <input type="text" id="direccion" name="direccion" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="area_especializacion">Área de especialización</label>
              <input
                type="text"
                id="area_especializacion"
                name="area_especializacion"
              />
            </div>
            <div class="form-group">
              <label for="institucion">Institución</label>
              <input type="text" id="institucion" name="institucion" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="contraseña">Contraseña</label>
              <input
                type="password"
                id="contraseña"
                name="contraseña"
                required
              />
            </div>
            <div class="form-group">
              <label for="confirmar">Confirmar contraseña</label>
              <input type="password" id="confirmar" name="confirmar" required />
            </div>
          </div>

          <button type="submit" class="btn">Registrarse</button>

          <p class="link">
            ¿Ya tienes cuenta?
            <a
              href="{% url 'base:login_profesor' %}"
              style="color: #6a5acd; text-decoration: underline"
            >
              Iniciar sesión
            </a>
          </p>
        </form>
      </div>
      <div class="right-panel">
        <img src="{% static 'img/image1.png' %}" alt="Ilustración educativa" />
      </div>
    </div>
  </body>
</html>
